name: Pre-Publication Validation

on:
  push:
    branches:
      - 'validation/**'
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base branch or commit to validate against
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: publication-gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes clang-format clang-tidy
          python -m pip install --disable-pip-version-check yamllint==1.38.0

      - name: Resolve validation base
        id: base
        env:
          INPUT_BASE_REF: ${{ inputs.base_ref }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [[ -n "$INPUT_BASE_REF" ]]; then
            base_ref="$INPUT_BASE_REF"
          else
            base_ref="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -n 's/^Validation-Base: //p' | tail -n 1)"
          fi

          if [[ -z "$base_ref" ]]; then
            echo "Validation candidate commit must contain 'Validation-Base: <ref>' in its commit message." >&2
            exit 1
          fi

          git fetch origin "$base_ref" --depth=1 || true
          resolved="$(git rev-parse "$base_ref" 2>/dev/null || git rev-parse "origin/$base_ref" 2>/dev/null)"
          echo "sha=$resolved" >> "$GITHUB_OUTPUT"

      - name: Run mandatory publication gate
        run: bash scripts/ci/validate_publish.sh "${{ steps.base.outputs.sha }}" HEAD
