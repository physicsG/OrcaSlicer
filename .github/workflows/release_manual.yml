name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to build
        required: true
        default: main
        type: string
      build_linux:
        description: Build Ubuntu 24.04 AppImage
        required: true
        default: true
        type: boolean
      build_windows:
        description: Build Windows installer and portable archive
        required: true
        default: true
        type: boolean
      build_macos:
        description: Build macOS 14 universal DMG
        required: true
        default: true
        type: boolean
      run_full_tests:
        description: Run the Linux CI test gate before packaging
        required: true
        default: true
        type: boolean
      sign_artifacts:
        description: Sign and notarize the macOS artifact
        required: true
        default: false
        type: boolean
      publish_mode:
        description: What to do with successful artifacts
        required: true
        default: artifacts-only
        type: choice
        options:
          - artifacts-only
          - draft-release
          - prerelease
          - production-release
      version_label:
        description: Optional artifact and release label
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: manual-release-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate request
    runs-on: ubuntu-24.04
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      version: ${{ steps.metadata.outputs.version }}
      version_label: ${{ steps.metadata.outputs.version_label }}
    steps:
      - name: Checkout trusted release tooling
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          path: _release_control
          sparse-checkout: scripts/release
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Checkout selected source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref }}
          path: source
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve source and version metadata
        id: metadata
        working-directory: source
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
          VERSION_LABEL_INPUT: ${{ inputs.version_label }}
        run: |
          python ../_release_control/scripts/release/resolve_release_metadata.py \
            --source-ref "$SOURCE_REF_INPUT" \
            --version-label "$VERSION_LABEL_INPUT"

      - name: Validate release request
        working-directory: source
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
          VERSION_LABEL_INPUT: ${{ steps.metadata.outputs.version_label }}
          PUBLISH_MODE_INPUT: ${{ inputs.publish_mode }}
          BUILD_LINUX_INPUT: ${{ inputs.build_linux }}
          BUILD_WINDOWS_INPUT: ${{ inputs.build_windows }}
          BUILD_MACOS_INPUT: ${{ inputs.build_macos }}
          RUN_FULL_TESTS_INPUT: ${{ inputs.run_full_tests }}
          SIGN_ARTIFACTS_INPUT: ${{ inputs.sign_artifacts }}
        run: |
          python ../_release_control/scripts/release/validate_release_request.py \
            --source-ref "$SOURCE_REF_INPUT" \
            --version-label "$VERSION_LABEL_INPUT" \
            --publish-mode "$PUBLISH_MODE_INPUT" \
            --build-linux "$BUILD_LINUX_INPUT" \
            --build-windows "$BUILD_WINDOWS_INPUT" \
            --build-macos "$BUILD_MACOS_INPUT" \
            --run-full-tests "$RUN_FULL_TESTS_INPUT" \
            --sign-artifacts "$SIGN_ARTIFACTS_INPUT"

      - name: Summarize request
        env:
          SOURCE_REF_INPUT: ${{ inputs.source_ref }}
          COMMIT_OUTPUT: ${{ steps.metadata.outputs.commit }}
          VERSION_OUTPUT: ${{ steps.metadata.outputs.version }}
          VERSION_LABEL_OUTPUT: ${{ steps.metadata.outputs.version_label }}
          PUBLISH_MODE_INPUT: ${{ inputs.publish_mode }}
          BUILD_LINUX_INPUT: ${{ inputs.build_linux }}
          BUILD_WINDOWS_INPUT: ${{ inputs.build_windows }}
          BUILD_MACOS_INPUT: ${{ inputs.build_macos }}
          RUN_FULL_TESTS_INPUT: ${{ inputs.run_full_tests }}
          SIGN_ARTIFACTS_INPUT: ${{ inputs.sign_artifacts }}
        run: |
          {
            echo '### Manual release request'
            echo
            echo "- Source ref: $SOURCE_REF_INPUT"
            echo "- Commit: $COMMIT_OUTPUT"
            echo "- Version: $VERSION_OUTPUT"
            echo "- Artifact label: $VERSION_LABEL_OUTPUT"
            echo "- Publish mode: $PUBLISH_MODE_INPUT"
            echo "- Linux: $BUILD_LINUX_INPUT"
            echo "- Windows: $BUILD_WINDOWS_INPUT"
            echo "- macOS: $BUILD_MACOS_INPUT"
            echo "- Full tests: $RUN_FULL_TESTS_INPUT"
            echo "- Signing: $SIGN_ARTIFACTS_INPUT"
          } >> "$GITHUB_STEP_SUMMARY"

  tests:
    name: Full test gate
    needs: prepare
    if: inputs.run_full_tests
    uses: ./.github/workflows/ci_tests.yml
    with:
      source_ref: ${{ inputs.source_ref }}
      run_changed_tidy: false

  build-linux:
    name: Linux release bundle
    needs:
      - prepare
      - tests
    if: >-
      ${{ always() && inputs.build_linux && needs.prepare.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: linux
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ needs.prepare.outputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: false

  build-windows:
    name: Windows release bundle
    needs:
      - prepare
      - tests
    if: >-
      ${{ always() && inputs.build_windows && needs.prepare.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: windows
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ needs.prepare.outputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: false

  build-macos:
    name: macOS release bundle
    needs:
      - prepare
      - tests
    if: >-
      ${{ always() && inputs.build_macos && needs.prepare.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: macos
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ needs.prepare.outputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: ${{ inputs.sign_artifacts }}

  publish:
    name: Publish selected release mode
    needs:
      - prepare
      - tests
      - build-linux
      - build-windows
      - build-macos
    if: >-
      ${{ always() && inputs.publish_mode != 'artifacts-only' &&
          needs.prepare.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') &&
          (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') &&
          (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
          (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') }}
    permissions:
      contents: write
    uses: ./.github/workflows/publish_release.yml
    with:
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ needs.prepare.outputs.version_label }}
      publish_mode: ${{ inputs.publish_mode }}
      build_linux: ${{ inputs.build_linux }}
      build_windows: ${{ inputs.build_windows }}
      build_macos: ${{ inputs.build_macos }}
      run_full_tests: ${{ inputs.run_full_tests }}
      sign_artifacts: ${{ inputs.sign_artifacts }}

  summary:
    name: Release summary
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - prepare
      - tests
      - build-linux
      - build-windows
      - build-macos
      - publish
    steps:
      - name: Report results
        env:
          PUBLISH_MODE_INPUT: ${{ inputs.publish_mode }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          LINUX_RESULT: ${{ needs.build-linux.result }}
          WINDOWS_RESULT: ${{ needs.build-windows.result }}
          MACOS_RESULT: ${{ needs.build-macos.result }}
          PUBLISH_RESULT: ${{ needs.publish.result }}
        run: |
          {
            echo '### Manual release results'
            echo
            echo "- Request validation: $PREPARE_RESULT"
            echo "- Tests: $TESTS_RESULT"
            echo "- Linux: $LINUX_RESULT"
            echo "- Windows: $WINDOWS_RESULT"
            echo "- macOS: $MACOS_RESULT"
            echo "- Publication: $PUBLISH_RESULT"
            echo
            if [[ "$PUBLISH_MODE_INPUT" == 'artifacts-only' ]]; then
              echo 'No GitHub release was created. Download the selected bundles from this workflow run.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$PREPARE_RESULT" != 'success' ]]; then
            exit 1
          fi
          if [[ "$TESTS_RESULT" != 'success' && "$TESTS_RESULT" != 'skipped' ]]; then
            exit 1
          fi
          for result in "$LINUX_RESULT" "$WINDOWS_RESULT" "$MACOS_RESULT"; do
            if [[ "$result" != 'success' && "$result" != 'skipped' ]]; then
              exit 1
            fi
          done
          if [[ "$PUBLISH_MODE_INPUT" != 'artifacts-only' && "$PUBLISH_RESULT" != 'success' ]]; then
            exit 1
          fi
