name: Workflow Inventory

on:
  pull_request:
    paths:
      - '.github/workflows/debug_workflow_inventory.yml'

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github/workflows
          sparse-checkout-cone-mode: false
          show-progress: false
      - name: List workflow files
        run: find .github/workflows -maxdepth 1 -type f -printf '%f\n' | sort > workflow-files.txt
      - name: Upload workflow inventory
        uses: actions/upload-artifact@v4
        with:
          name: workflow-files
          path: workflow-files.txt
