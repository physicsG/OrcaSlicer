name: Build Snapmaker Orca Compatibility

on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      os:
        required: true
        type: string
      arch:
        required: false
        type: string
    outputs:
      release:
        description: Resolved release artifact label
        value: ${{ jobs.build.outputs.release }}

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ inputs.os }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: ${{ inputs.os == 'ubuntu-24.04' && 'linux' || inputs.os == 'windows-2022' && 'windows' || inputs.os == 'macos-14' && 'macos' || '' }}
      source_ref: ${{ github.sha }}
      version_label: ''
      tests_passed: false
      sign_artifacts: false
      package_artifact: true
