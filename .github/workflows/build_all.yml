name: Manual Build Verification

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or commit SHA to package
        required: true
        type: string
        default: main
      build_linux:
        description: Build Ubuntu 24.04 AppImage
        required: true
        type: boolean
        default: true
      build_windows:
        description: Build Windows installer and portable archive
        required: true
        type: boolean
        default: false
      build_macos:
        description: Build macOS universal DMG
        required: true
        type: boolean
        default: false
      run_full_tests:
        description: Run the Linux CI test gate before packaging
        required: true
        type: boolean
        default: false
      version_label:
        description: Artifact label for the verification build
        required: false
        type: string
        default: branch-verification

permissions:
  contents: read

concurrency:
  group: manual-build-verification-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  validate-request:
    name: Validate manual request
    runs-on: ubuntu-24.04
    steps:
      - name: Require at least one platform
        env:
          BUILD_LINUX: ${{ inputs.build_linux }}
          BUILD_WINDOWS: ${{ inputs.build_windows }}
          BUILD_MACOS: ${{ inputs.build_macos }}
        run: |
          if [[ "$BUILD_LINUX" != 'true' && "$BUILD_WINDOWS" != 'true' && "$BUILD_MACOS" != 'true' ]]; then
            echo 'Select at least one platform.' >&2
            exit 1
          fi

  tests:
    name: Release verification tests
    needs: validate-request
    if: inputs.run_full_tests
    uses: ./.github/workflows/ci_tests.yml
    with:
      source_ref: ${{ inputs.source_ref }}
      run_changed_tidy: false

  linux:
    name: Verify Linux release bundle
    needs:
      - validate-request
      - tests
    if: >-
      ${{ always() && inputs.build_linux && needs.validate-request.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: linux
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ inputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: false

  windows:
    name: Verify Windows release bundle
    needs:
      - validate-request
      - tests
    if: >-
      ${{ always() && inputs.build_windows && needs.validate-request.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: windows
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ inputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: false

  macos:
    name: Verify macOS release bundle
    needs:
      - validate-request
      - tests
    if: >-
      ${{ always() && inputs.build_macos && needs.validate-request.result == 'success' &&
          (needs.tests.result == 'success' || needs.tests.result == 'skipped') }}
    uses: ./.github/workflows/build_platform.yml
    with:
      platform: macos
      source_ref: ${{ inputs.source_ref }}
      version_label: ${{ inputs.version_label }}
      tests_passed: ${{ inputs.run_full_tests && needs.tests.result == 'success' }}
      sign_artifacts: false

  summary:
    name: Manual build summary
    runs-on: ubuntu-24.04
    if: always()
    needs:
      - validate-request
      - tests
      - linux
      - windows
      - macos
    steps:
      - name: Report verification results
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
          VERSION_LABEL: ${{ inputs.version_label }}
          VALIDATION_RESULT: ${{ needs.validate-request.result }}
          TESTS_RESULT: ${{ needs.tests.result }}
          LINUX_RESULT: ${{ needs.linux.result }}
          WINDOWS_RESULT: ${{ needs.windows.result }}
          MACOS_RESULT: ${{ needs.macos.result }}
        run: |
          {
            echo '### Manual build verification'
            echo
            echo "- Source ref: $SOURCE_REF"
            echo "- Version label: $VERSION_LABEL"
            echo "- Request validation: $VALIDATION_RESULT"
            echo "- Tests: $TESTS_RESULT"
            echo "- Linux: $LINUX_RESULT"
            echo "- Windows: $WINDOWS_RESULT"
            echo "- macOS: $MACOS_RESULT"
            echo
            echo 'This workflow is manual, unsigned, artifacts-only, and cannot publish a GitHub release.'
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$VALIDATION_RESULT" != 'success' ]]; then
            exit 1
          fi
          if [[ "$TESTS_RESULT" != 'success' && "$TESTS_RESULT" != 'skipped' ]]; then
            exit 1
          fi
          for result in "$LINUX_RESULT" "$WINDOWS_RESULT" "$MACOS_RESULT"; do
            if [[ "$result" != 'success' && "$result" != 'skipped' ]]; then
              exit 1
            fi
          done
