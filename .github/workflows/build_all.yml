name: Build all

on:
  schedule:
    - cron: '0 18 * * *'

  workflow_dispatch:
    inputs:
      build-deps-only:
        description: Only build dependencies
        type: boolean
        default: false
      force-build:
        description: Force full rebuild
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_all:
    name: Build All
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
          - os: windows-2022
          - os: macos-14
            arch: arm64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: ${{ matrix.os }}
      arch: ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}

  flatpak:
    name: Flatpak
    if: ${{ !inputs.build-deps-only }}
    concurrency:
      group: flatpak-${{ matrix.variant.arch }}-${{ github.ref }}
      cancel-in-progress: false
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
      volumes:
        - /usr/local/lib/android:/usr/local/lib/android
        - /usr/share/dotnet:/usr/share/dotnet
        - /opt/ghc:/opt/ghc1
        - /usr/local/share/boost:/usr/local/share/boost1
    strategy:
      matrix:
        variant:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.variant.runner }}
    env:
      date:
      ver:
      ver_pure:
    steps:
      - name: Remove unneeded files to free disk space
        run: >-
          rm -rf /usr/local/lib/android/* /usr/share/dotnet/* /opt/ghc1/*
          "/usr/local/share/boost1/*"

      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Get the version and date
        run: |
          ver_pure=$(grep 'set(Snapmaker_VERSION' version.inc | cut -d '"' -f2)
          ver="V$ver_pure"
          echo "ver=$ver" >> "$GITHUB_ENV"
          echo "ver_pure=$ver_pure" >> "$GITHUB_ENV"
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_ENV"
        shell: bash

      - uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: Snapmaker_Orca-Linux-flatpak_${{ env.ver }}_${{ matrix.variant.arch }}.flatpak
          manifest-path: scripts/flatpak/io.github.Snapmaker.Snapmaker_Orca.yml
          cache: true
          arch: ${{ matrix.variant.arch }}
          upload-artifact: false

      - name: Find Flatpak bundle file
        id: find_bundle
        working-directory: ${{ github.workspace }}
        run: |
          bundle_name="Snapmaker_Orca-Linux-flatpak_${{ env.ver }}_${{ matrix.variant.arch }}.flatpak"
          if [[ -f "$bundle_name" ]]; then
            bundle_path="$PWD/$bundle_name"
          elif [[ -f "/__w/Snapmaker_Orca/Snapmaker_Orca/$bundle_name" ]]; then
            bundle_path="/__w/Snapmaker_Orca/Snapmaker_Orca/$bundle_name"
          else
            found=$(find . -name "$bundle_name" -type f | head -1)
            if [[ -z "$found" ]]; then
              echo "Could not find $bundle_name" >&2
              find . -name '*.flatpak' -type f || true
              exit 1
            fi
            bundle_path="$(cd "$(dirname "$found")" && pwd)/$(basename "$found")"
          fi
          echo "path=$bundle_path" >> "$GITHUB_OUTPUT"
          ls -lh "$bundle_path"
        shell: bash

      - name: Upload Flatpak workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Snapmaker_Orca-Linux-flatpak_${{ env.ver }}_${{ matrix.variant.arch }}.flatpak
          path: ${{ steps.find_bundle.outputs.path }}
          if-no-files-found: error
